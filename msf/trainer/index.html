<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trainer · MS Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0E0C0B;
  --surface:#181513;
  --surface-2:#211C19;
  --line:rgba(244,238,228,0.09);
  --line-2:rgba(244,238,228,0.16);
  --ink:#F4EEE4;
  --ink-2:rgba(244,238,228,0.56);
  --ink-3:rgba(244,238,228,0.34);
  --sage:#9DB49A;
  --bad:#C97A6D;
  --radius:18px;
  --display:'Bricolage Grotesque',sans-serif;
  --body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:0 0 60px}

.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;background:rgba(14,12,11,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.tb-title{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.02em;line-height:1}
.tb-sub{font-size:11px;color:var(--ink-3);margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);transition:background .2s}
.sync-dot.syncing{background:var(--fat);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.cpills{display:flex;gap:7px;overflow-x:auto;padding:14px 20px 6px;scrollbar-width:none}
.cpills::-webkit-scrollbar{display:none}
.client-pill{padding:8px 15px;border:1px solid var(--line-2);border-radius:99px;font-size:13px;font-weight:600;background:var(--surface);color:var(--ink-2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.client-pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

#dcontent{padding:0 20px;margin-top:6px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin:26px 0 12px}
.loader,.empty{text-align:center;padding:3rem 1rem;color:var(--ink-3);font-size:14px;line-height:1.6}

.av{width:42px;height:42px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink-2);flex-shrink:0}

.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;margin-bottom:13px;cursor:pointer;transition:border-color .15s,transform .12s}
.tcard:active{transform:scale(.995)}
.tc-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.tc-name{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.1}
.tc-goal{font-size:12px;color:var(--ink-3);margin-top:2px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0 0}
.stat-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
.tcard .stat-box{background:var(--surface-2)}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.stat-val{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1}
.stat-val small{font-size:12px;color:var(--ink-3);font-weight:600;margin-left:1px}

.flag-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:11px;font-size:12.5px;font-weight:600;margin-top:9px;line-height:1.35}
.flag-up{background:rgba(157,180,154,.13);color:var(--sage)}
.flag-warn{background:rgba(201,122,109,.13);color:var(--bad)}
.tlink{font-size:11.5px;color:var(--ink-3);font-family:var(--body);margin-top:13px;letter-spacing:.02em}
/* ===== TRIAGE ===== */
.triage-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.tri-sum{flex:1;min-width:92px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 12px;text-align:center}
.tri-sum-n{font-family:var(--display);font-weight:800;font-size:22px;line-height:1}
.tri-sum-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3);margin-top:5px}
.tri-red .tri-sum-n{color:var(--bad)}
.tri-amber .tri-sum-n{color:#CBA67D}
.tri-green .tri-sum-n{color:var(--sage)}
.tcard.st-red{border-left:3px solid var(--bad)}
.tcard.st-amber{border-left:3px solid #CBA67D}
.tcard.st-green{border-left:3px solid var(--sage)}
.st-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-left:auto}
.st-dot.red{background:var(--bad)}
.st-dot.amber{background:#CBA67D}
.st-dot.green{background:var(--sage)}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.chip.req{background:rgba(200,98,46,.16);color:#C8622E}
.req-box{margin-bottom:16px}
.req-item{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(200,98,46,.08);border:1px solid rgba(200,98,46,.3);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.req-meal{font-size:14px;font-weight:700;color:var(--ink)}
.req-when{font-size:11px;color:var(--ink-3);margin-top:3px}
.req-resolve{background:#C8622E;color:var(--bg);border:none;border-radius:9px;font-family:var(--body);font-weight:700;font-size:12px;padding:8px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.req-place{background:none;border:1px solid #C8622E;color:#C8622E;border-radius:9px;font-family:var(--body);font-weight:700;font-size:12px;padding:8px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.req-acts{display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
/* ===== recipe placement panel ===== */
.fit-overlay{position:fixed;inset:0;background:rgba(14,12,11,.75);backdrop-filter:blur(5px);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.fit-overlay.show{display:flex}
.fit-box{background:var(--bg);border:1px solid var(--line-2);border-radius:18px;width:100%;max-width:680px;max-height:88vh;display:flex;flex-direction:column}
.fit-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px 14px;border-bottom:1px solid var(--line);flex-shrink:0}
.fit-title{font-family:var(--display);font-weight:700;font-size:19px;color:var(--ink);line-height:1.25}
.fit-x{background:var(--surface-2);border:none;border-radius:10px;color:var(--ink-2);font-size:15px;width:34px;height:34px;cursor:pointer;flex-shrink:0}
.fit-body{overflow-y:auto;padding:16px 20px 22px}
.fit-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px}
.fit-m{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:10px 6px;text-align:center}
.fit-m-v{font-family:var(--display);font-weight:700;font-size:17px;color:#C8622E}
.fit-m-l{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-top:3px}
.fit-note{font-size:12px;color:var(--ink-3);line-height:1.5;margin-bottom:4px}
.fit-slot{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:9px}
.fit-slot.best{border-color:rgba(200,98,46,.45);background:rgba(200,98,46,.07)}
.fit-slot-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.fit-slot-name{font-size:14px;font-weight:700;color:var(--ink)}
.fit-slot-cur{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.fit-delta{font-size:12px;font-weight:700;margin-top:6px}
.fit-delta.good{color:var(--good,#5FA46C)}
.fit-delta.warn{color:#CBA67D}
.fit-delta.bad{color:var(--bad)}
.fit-btns{display:flex;gap:7px;flex-shrink:0}
.fit-btn{border:none;border-radius:9px;font-family:var(--body);font-weight:700;font-size:12px;padding:8px 12px;cursor:pointer;white-space:nowrap}
.fit-btn.rep{background:#C8622E;color:var(--bg)}
.fit-btn.add{background:none;border:1px solid var(--line-2);color:var(--ink-2)}
.fit-btn.add:hover{border-color:var(--ink-3);color:var(--ink)}
.fit-badge{display:inline-block;font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;background:#C8622E;color:var(--bg);padding:2px 7px;border-radius:6px;margin-bottom:5px}
.chip{font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;white-space:nowrap}
.chip.red{background:rgba(201,122,109,.14);color:var(--bad)}
.chip.amber{background:rgba(203,166,125,.14);color:#CBA67D}
.chip.info{background:var(--surface-2);color:var(--ink-2)}
/* ===== COACH NOTES ===== */
.note-add{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:12px}
.note-in{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;color:var(--ink);font-family:var(--body);font-size:14px;padding:11px 12px;outline:none;resize:vertical;min-height:64px;margin-bottom:8px}
.note-in:focus{border-color:var(--sage)}
.note-row{display:flex;gap:8px;align-items:center}
.note-date{flex:1;background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;color:var(--ink-2);font-family:var(--body);font-size:13px;padding:9px 10px;outline:none}
.note-save{background:var(--sage);color:var(--bg);border:none;border-radius:10px;font-family:var(--body);font-weight:700;font-size:13px;padding:10px 16px;cursor:pointer;white-space:nowrap}
.note-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.note-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.note-when{font-size:11px;font-weight:700;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em}
.note-del{background:none;border:none;color:var(--ink-3);font-size:13px;cursor:pointer;padding:0 2px}
.note-txt{font-size:13.5px;color:var(--ink-2);line-height:1.55;white-space:pre-wrap}
/* ===== RENEWAL ===== */
.renew{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:12px}
.renew.soon{border-color:rgba(201,122,109,.45);background:rgba(201,122,109,.08)}
.renew-l{font-size:12px;color:var(--ink-3);font-weight:600}
.renew-v{font-family:var(--display);font-weight:700;font-size:15px;color:var(--ink)}
.renew.soon .renew-v{color:var(--bad)}
/* ===== FOLDERS ===== */
.folder-bar{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fchip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border:1px solid var(--line-2);border-radius:99px;font-size:12.5px;font-weight:600;background:var(--surface);color:var(--ink-2);cursor:pointer;white-space:nowrap}
.fchip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.fchip-n{opacity:.6;font-weight:700}
.fchip-x{opacity:.55;font-size:11px;padding:0 1px}
.fchip-x:hover{opacity:1;color:var(--bad)}
.fchip-new{border-style:dashed;color:var(--ink-3)}
.card-folder{margin-top:11px;display:flex;align-items:center;gap:7px}
.card-folder-l{font-size:11px;color:var(--ink-3);font-weight:600}
.fsel{flex:1;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;color:var(--ink-2);font-family:var(--body);font-size:11.5px;font-weight:600;padding:6px 8px;-webkit-appearance:none;cursor:pointer}
.fsel:focus{outline:none;border-color:var(--sage)}
/* ===== DETAIL TWO-COLUMN ===== */
.detail-grid{display:grid;grid-template-columns:1fr;gap:0}
.dcol{min-width:0}

/* ===== DESKTOP — full screen ===== */
@media (min-width:1000px){
  .app{max-width:1500px;padding:0 0 60px}
  .topbar{padding:20px 28px 16px}
  .cpills{padding:16px 28px 6px}
  #dcontent{padding:0 28px}
  #dcontent.overview{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px;align-items:start}
  #dcontent.overview>.triage-bar,#dcontent.overview>.folder-bar{grid-column:1/-1}
  #dcontent.overview>.tcard{margin-bottom:0}
  .detail-grid{grid-template-columns:1fr 1fr;gap:28px;align-items:start}
  .stat-grid{grid-template-columns:repeat(4,1fr)}
}

.po-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.po-name{font-size:13.5px;font-weight:600}
.po-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:rgba(157,180,154,.14);color:var(--sage);white-space:nowrap}

.wt-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.wt-head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.wt-cur{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.02em;line-height:1}
.wt-cur small{font-size:14px;color:var(--ink-3);font-weight:600;margin-left:2px}
.wt-delta{font-family:var(--display);font-weight:700;font-size:15px;color:var(--sage)}
.wt-start{font-size:12px;color:var(--ink-3);margin-left:auto}
.wt-chart{width:100%;height:auto;display:block}
.wt-empty{font-size:13px;color:var(--ink-3);text-align:center;padding:14px 10px}

.adh-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.adh-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:15px}
.adh-pct{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.02em;line-height:1}
.adh-sub{font-size:12px;color:var(--ink-2);text-align:right}
.adh-strip{display:grid;grid-template-columns:repeat(15,1fr);gap:4px}
.adh-dot{aspect-ratio:1;border-radius:3px;background:var(--surface-2)}
.adh-dot.on{background:var(--sage)}

.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.ptile{aspect-ratio:3/4;border-radius:14px;background:var(--surface-2) center/cover no-repeat;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:8px;cursor:pointer}
.ptile::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5),transparent 55%)}
.pdate{font-size:10px;color:#fff;font-weight:600;position:relative;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:24px}
.lb.show{display:flex}
.lb img{max-width:100%;max-height:82vh;border-radius:12px;object-fit:contain}
.lb-x{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;border:1px solid var(--line-2);background:rgba(0,0,0,.45);color:var(--ink);font-size:17px;cursor:pointer}

.chart-sel{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:12px;padding:12px 14px;color:var(--ink);font-family:var(--body);font-size:14px;margin-bottom:12px;-webkit-appearance:none}
.chart-sel:focus{outline:none;border-color:var(--sage)}
.chart-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.lift-tbl{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.lift-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
.lift-row:last-child{border-bottom:none}
.lift-head{background:var(--surface-2)}
.lift-head>div{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3)}
.lt-ex{font-size:13px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis}
.lt-last{font-size:13px;font-weight:600;color:var(--ink-2);white-space:nowrap;text-align:right}
.lt-chg{font-size:12px;font-weight:700;white-space:nowrap;text-align:right;min-width:78px}
.chg-up{color:var(--sage)}
.chg-dn{color:var(--bad)}
.chg-none{color:var(--ink-3)}
.food-tbl{display:flex;flex-direction:column;gap:8px}
.food-day{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
.food-day-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.food-date{font-size:13px;font-weight:600;color:var(--ink)}
.food-cal{font-size:13px;font-weight:700;color:var(--sage);white-space:nowrap}
.food-cal.over{color:var(--bad)}
.food-notes{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
.food-note{font-size:12px;color:var(--ink-2);line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><div class="tb-title">Trainer</div><div class="tb-sub">MS Fitness · live data</div></div>
    <div class="sync-dot" id="sd"></div>
  </div>
  <div class="cpills" id="cpills"></div>
  <div id="dcontent"><div class="loader">Loading clients…</div></div>
</div>
<div class="lb" id="lightbox"><button class="lb-x" onclick="closeLB()">✕</button><img id="lb-img" alt=""></div>

<div class="fit-overlay" id="fit-panel">
  <div class="fit-box">
    <div class="fit-head">
      <div class="fit-title" id="fit-title">Place recipe</div>
      <button class="fit-x" onclick="closeFit()">✕</button>
    </div>
    <div class="fit-body" id="fit-body"></div>
  </div>
</div>

<script>
var SB_URL="https://idlwqbgsnjoikoyhifbr.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkbHdxYmdzbmpvaWtveWhpZmJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjI5MDksImV4cCI6MjA5NzAzODkwOX0.K6axtuPPxVHn5CtZ5kplw20P5YtLd7kpAAkylhk-QNg";
var sb=supabase.createClient(SB_URL,SB_KEY);
var clients=[],curClient=null,chart=null;
var folders=[],curFolder="__all__";

function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function sync(on){document.getElementById("sd").classList.toggle("syncing",!!on);}
function initials(name){return (name||"").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();}
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function signed(n){return (n>0?"+":"")+n.toFixed(1);}

// ── METRICS ──
function sessionCount(liftRows){
  return new Set(liftRows.map(function(r){return new Date(r.logged_at).toDateString()+"_"+r.day;})).size;
}
function lastActiveMs(lift,body,nat,food){
  var t=[];
  lift.forEach(function(r){if(r.logged_at)t.push(new Date(r.logged_at).getTime());});
  body.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  nat.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  food.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  return t.length?Math.max.apply(null,t):null;
}
function weightTrend(body){
  var pts=body.filter(function(r){return r.weight!=null;}).slice().sort(function(a,b){return a.logged_date<b.logged_date?-1:1;});
  if(!pts.length)return null;
  var first=parseFloat(pts[0].weight),last=parseFloat(pts[pts.length-1].weight);
  return {first:first,last:last,delta:last-first,pts:pts};
}
function loggedMapOf(nat,food){var m={};nat.forEach(function(r){m[r.logged_date]=1;});food.forEach(function(r){m[r.logged_date]=1;});return m;}
function adh30(map){
  var today=new Date();today.setHours(12,0,0,0);var count=0;
  for(var i=0;i<30;i++){var d=new Date(today);d.setDate(d.getDate()-i);if(map[ymd(d)])count++;}
  return {count:count,pct:Math.round(count/30*100)};
}
function adhStrip(map){
  var today=new Date();today.setHours(12,0,0,0);var out=[];
  for(var i=29;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);out.push(!!map[ymd(d)]);}
  return out;
}
function getFlags(rows){
  var flags=[],today=new Date().toDateString();
  var tr=rows.filter(function(r){return new Date(r.logged_at).toDateString()===today;});
  var byEx={};
  tr.forEach(function(r){if(!byEx[r.ex_id])byEx[r.ex_id]={name:r.ex_name,sets:[]};byEx[r.ex_id].sets[r.set_index]=r;});
  Object.values(byEx).forEach(function(ex){
    var f=ex.sets.filter(Boolean);if(!f.length)return;
    var ok=f.every(function(s,i){return i===0||(s.reps&&s.reps>=8);});
    if(ok&&!flags.includes(ex.name))flags.push(ex.name);
  });
  return flags;
}

function weightChartSVG(pts){
  if(!pts.length)return '<div class="wt-empty">No weigh-ins yet.</div>';
  var ws=pts.map(function(p){return parseFloat(p.weight);});
  var min=Math.min.apply(null,ws),max=Math.max.apply(null,ws);
  if(min===max){min-=1;max+=1;}
  var pad=(max-min)*0.18;min-=pad;max+=pad;
  var W=320,H=130,n=pts.length;
  function X(i){return n===1?W/2:+((i/(n-1))*W).toFixed(1);}
  function Y(w){return +(H-((w-min)/(max-min))*H).toFixed(1);}
  var line="";
  pts.forEach(function(p,i){line+=(i===0?"M":"L")+X(i)+","+Y(parseFloat(p.weight));});
  var area=line+"L"+X(n-1)+","+H+"L"+X(0)+","+H+"Z";
  var lx=X(n-1),ly=Y(parseFloat(pts[n-1].weight));
  var svg='<svg class="wt-chart" viewBox="0 0 '+W+' '+H+'">';
  svg+='<defs><linearGradient id="wtg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(157,180,154,.28)"/><stop offset="100%" stop-color="rgba(157,180,154,0)"/></linearGradient></defs>';
  if(n>1){svg+='<path d="'+area+'" fill="url(#wtg)"/><path d="'+line+'" fill="none" stroke="#9DB49A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';}
  svg+='<circle cx="'+lx+'" cy="'+ly+'" r="4" fill="#9DB49A"/></svg>';
  return svg;
}

// ── TRIAGE ──
function daysAgo(ms){ return ms==null?null:Math.floor((Date.now()-ms)/86400000); }
function foodDays7(map){
  var today=new Date();today.setHours(12,0,0,0);var n=0;
  for(var i=0;i<7;i++){var d=new Date(today);d.setDate(d.getDate()-i);if(map[ymd(d)])n++;}
  return n;
}
function daysUntil(dateStr){
  if(!dateStr)return null;
  var end=new Date(dateStr+"T12:00:00");var t=new Date();t.setHours(12,0,0,0);
  return Math.round((end-t)/86400000);
}
// Returns {status:"red"|"amber"|"green", chips:[{t,cls}]}
function triage(c, inactive, f7, contactDays, renewDays){
  var chips=[], red=false, amber=false;
  // grace period — a client onboarded this week isn't "slipping"
  var age = c.created_at ? daysAgo(new Date(c.created_at).getTime()) : 999;
  var fresh = age!=null && age < 7;

  if(!fresh){
    if(inactive==null||inactive>=7){ red=true; chips.push({t:(inactive==null?"never logged in":inactive+"d inactive"),cls:"red"}); }
    else if(inactive>=4){ amber=true; chips.push({t:inactive+"d inactive",cls:"amber"}); }

    if(f7<=2){ red=true; chips.push({t:"food "+f7+"/7",cls:"red"}); }
    else if(f7<=4){ amber=true; chips.push({t:"food "+f7+"/7",cls:"amber"}); }

    if(contactDays==null||contactDays>=14){ red=true; chips.push({t:(contactDays==null?"never contacted":"no contact "+contactDays+"d"),cls:"red"}); }
    else if(contactDays>=7){ amber=true; chips.push({t:"no contact "+contactDays+"d",cls:"amber"}); }
  } else {
    chips.push({t:"new client",cls:"info"});
  }

  if(renewDays!=null){
    if(renewDays<0){ red=true; chips.push({t:"package ended",cls:"red"}); }
    else if(renewDays<=14){ red=true; chips.push({t:"renews in "+renewDays+"d",cls:"red"}); }
    else if(renewDays<=30){ chips.push({t:"renews in "+renewDays+"d",cls:"info"}); }
  }

  return {status: red?"red":(amber?"amber":"green"), chips:chips};
}

// ===== RECIPE PLACEMENT =====
var DAY_ORDER=["mon","tue","wed","thu","fri","sat","sun"];
var _fitReq=null,_fitSlug=null,_fitRecipe=null;

function closeFit(){document.getElementById("fit-panel").classList.remove("show");}

async function openFit(q,slug){
  _fitReq=q;_fitSlug=slug;
  var ov=document.getElementById("fit-panel");
  var body=document.getElementById("fit-body");
  document.getElementById("fit-title").textContent="Place: "+q.ref_name;
  body.innerHTML='<div class="loader">Working out where it fits\u2026</div>';
  ov.classList.add("show");

  var rr=await sb.from("recipes").select("*").eq("title",q.ref_name).maybeSingle();
  if(!rr.data){body.innerHTML='<div class="wt-empty">Couldn\'t find that recipe in the library \u2014 it may have been renamed or deleted.</div>';return;}
  _fitRecipe=rr.data;
  var rec=rr.data;

  var rm=await sb.from("meal_templates").select("*").eq("client_slug",slug);
  var meals=rm.data||[];
  var rt=await sb.from("nutrition_targets").select("*").eq("client_slug",slug).maybeSingle();
  var tgt=rt.data;

  body.innerHTML="";

  // recipe macros
  var mr=el("div","fit-macros");
  [[rec.calories||0,"Calories"],[(rec.protein||0)+"g","Protein"],[(rec.carbs||0)+"g","Carbs"],[(rec.fats||0)+"g","Fat"]].forEach(function(m){
    var b=el("div","fit-m");
    b.appendChild(el("div","fit-m-v",String(m[0])));
    b.appendChild(el("div","fit-m-l",m[1]));
    mr.appendChild(b);
  });
  body.appendChild(mr);

  var n1=el("div","fit-note");
  n1.textContent="Macros are per serving"+(rec.servings>1?(" \u00b7 recipe makes "+rec.servings):"")+
    (tgt?("  \u2022  Their daily target: "+tgt.calories+" kcal / "+tgt.protein+"P / "+tgt.carbs+"C / "+tgt.fats+"F"):"");
  body.appendChild(n1);

  if(!meals.length){
    body.appendChild(el("div","wt-empty","This client has no meal plan yet \u2014 build one in the admin first."));
    return;
  }

  // rank every existing meal by how little it disrupts their macros
  var scored=meals.map(function(m){
    var dk=(rec.calories||0)-(m.calories||0);
    var dp=(rec.protein||0)-(m.protein||0);
    var s=Math.abs(dk)+5*Math.abs(dp);
    var cat=(rec.category||"").toLowerCase();
    var nm=(m.meal_name||"").toLowerCase();
    var catMatch=cat&&nm&&nm.indexOf(cat)!==-1;
    if(catMatch)s=s*0.35;
    return {m:m,dk:dk,dp:dp,score:s,cat:catMatch};
  });
  scored.sort(function(a,b){
    if(a.score!==b.score)return a.score-b.score;
    return DAY_ORDER.indexOf(a.m.day_of_week)-DAY_ORDER.indexOf(b.m.day_of_week);
  });

  body.appendChild(el("div","sec-label","Best fits"));
  scored.forEach(function(s,i){
    var m=s.m;
    var slot=el("div","fit-slot"+(i===0?" best":""));
    if(i===0)slot.appendChild(el("div","fit-badge","Closest match"));
    var top=el("div","fit-slot-top");
    var lft=el("div","");
    lft.appendChild(el("div","fit-slot-name",dayFull(m.day_of_week)+" \u00b7 "+(m.meal_name||"Meal")+(s.cat?"  \u2713":"")));
    lft.appendChild(el("div","fit-slot-cur","Currently "+(m.calories||0)+" kcal \u00b7 "+(m.protein||0)+"P "+(m.carbs||0)+"C "+(m.fats||0)+"F"));
    var cls=Math.abs(s.dk)<=75?"good":(Math.abs(s.dk)<=200?"warn":"bad");
    var d=el("div","fit-delta "+cls);
    d.textContent="Swap \u2192 "+(s.dk>=0?"+":"\u2212")+Math.abs(s.dk)+" kcal, "+(s.dp>=0?"+":"\u2212")+Math.abs(s.dp)+"g protein";
    lft.appendChild(d);
    top.appendChild(lft);
    var btns=el("div","fit-btns");
    var rb=el("button","fit-btn rep","Replace");
    rb.onclick=(function(mm){return function(){placeRecipe(mm,"replace");};})(m);
    var ab=el("button","fit-btn add","Add");
    ab.onclick=(function(mm){return function(){placeRecipe(mm,"add");};})(m);
    btns.appendChild(rb);btns.appendChild(ab);
    top.appendChild(btns);
    slot.appendChild(top);
    body.appendChild(slot);
  });
}

async function placeRecipe(targetMeal,mode){
  var rec=_fitRecipe,slug=_fitSlug,q=_fitReq;
  if(!rec||!slug)return;
  var dayName=dayFull(targetMeal.day_of_week);
  var msg = mode==="replace"
    ? ("Replace "+dayName+" \u00b7 "+(targetMeal.meal_name||"meal")+" with \""+rec.title+"\"?\n\nTheir current meal will be overwritten.")
    : ("Add \""+rec.title+"\" as an extra meal on "+dayName+"?\n\nThis adds "+(rec.calories||0)+" kcal to that day.");
  if(!confirm(msg))return;

  var payload={
    meal_name:rec.title,
    ingredients:rec.ingredients||"",
    calories:rec.calories||0,
    protein:rec.protein||0,
    carbs:rec.carbs||0,
    fats:rec.fats||0
  };

  if(mode==="replace"){
    var u=await sb.from("meal_templates").update(payload).eq("id",targetMeal.id);
    if(u.error){alert("Couldn't update that meal: "+u.error.message);return;}
  } else {
    var rmax=await sb.from("meal_templates").select("meal_order").eq("client_slug",slug).eq("day_of_week",targetMeal.day_of_week);
    var mx=0;(rmax.data||[]).forEach(function(r){if((r.meal_order||0)>mx)mx=r.meal_order||0;});
    payload.client_slug=slug;
    payload.day_of_week=targetMeal.day_of_week;
    payload.option_num=1;
    payload.meal_order=mx+1;
    var ins=await sb.from("meal_templates").insert(payload);
    if(ins.error){alert("Couldn't add that meal: "+ins.error.message);return;}
  }

  if(q&&q.id) await sb.from("change_requests").update({status:"resolved",resolved_at:new Date().toISOString()}).eq("id",q.id);
  closeFit();
  renderClient(slug);
}

async function resolveReq(id,slug){
  await sb.from("change_requests").update({status:"resolved",resolved_at:new Date().toISOString()}).eq("id",id);
  renderClient(slug);
}

// ── PER-CLIENT DEEP VIEW ──
async function renderClient(slug){
  var dc=document.getElementById("dcontent");dc.className="";dc.innerHTML="";dc.appendChild(el("div","loader","Loading…"));
  sync(true);
  var c=clients.find(function(x){return x.slug===slug;})||{name:slug,slug:slug};
  var r1=await sb.from("lift_logs").select("*").eq("client",slug).order("logged_at",{ascending:true});
  var r2=await sb.from("programs").select("ex_id,ex_name").eq("client_slug",slug);
  var rb=await sb.from("body_logs").select("client_slug,logged_date,weight").eq("client_slug",slug);
  var rn=await sb.from("nutrition_logs").select("client_slug,logged_date,calories").eq("client_slug",slug);
  var rf=await sb.from("food_logs").select("client_slug,logged_date,calories").eq("client_slug",slug);
  var rp=await sb.from("progress_photos").select("*").eq("client_slug",slug).order("taken_date",{ascending:false});
  var rx=await sb.from("extra_logs").select("logged_date,note,created_at").eq("client_slug",slug);
  var rt=await sb.from("nutrition_targets").select("calories").eq("client_slug",slug).maybeSingle();
  var rcn=await sb.from("coach_notes").select("*").eq("client_slug",slug).order("note_date",{ascending:false}).order("created_at",{ascending:false});
  var rcr=await sb.from("change_requests").select("*").eq("client_slug",slug).eq("status","open").order("created_at",{ascending:false});
  sync(false);
  var lift=r1.data||[],body=rb.data||[],nat=rn.data||[],food=rf.data||[],photos=rp.data||[];
  var notes=rx.data||[],targetCal=(rt.data&&rt.data.calories)||0;
  var cnotes=rcn.data||[];
  var creqs=rcr.data||[];

  var sessions=sessionCount(lift);
  var wt=weightTrend(body);
  var map=loggedMapOf(nat,food);
  var adh=adh30(map);
  var flags=getFlags(lift.slice().reverse());
  var weeksIn=c.created_at?Math.floor((Date.now()-new Date(c.created_at).getTime())/(7*86400000)):0;
  var allEx=[];(r2.data||[]).forEach(function(r){if(!allEx.find(function(x){return x.id===r.ex_id;}))allEx.push({id:r.ex_id,name:r.ex_name});});

  dc.innerHTML="";
  var head=el("div","tc-head");head.style.marginTop="6px";head.appendChild(el("div","av",initials(c.name)));
  var hi=el("div");hi.appendChild(el("div","tc-name",c.name));hi.appendChild(el("div","tc-goal",c.goal||(sessions+" sessions logged")));head.appendChild(hi);
  dc.appendChild(head);

  var grid=el("div","stat-grid");
  grid.appendChild(statBox("Weeks in",String(weeksIn)));
  grid.appendChild(statBox("Sessions",String(sessions)));
  grid.appendChild(statBox("Weight",wt?signed(wt.delta)+"<small>kg</small>":"—"));
  var lastNoteMs=cnotes.length?new Date(cnotes[0].note_date+"T12:00:00").getTime():null;
  var contactDays=daysAgo(lastNoteMs);
  grid.appendChild(statBox("Last contact",contactDays==null?"—":(contactDays===0?"Today":contactDays+"d")));
  dc.appendChild(grid);

  // Meal change requests
  if(creqs.length){
    dc.appendChild(el("div","sec-label","Requests"));
    var rbox=el("div","req-box");
    creqs.forEach(function(q){
      var item=el("div","req-item");
      var left=el("div","");
      var label = q.kind==="recipe"
        ? ("\uD83C\uDF7D Wants recipe: "+q.ref_name)
        : q.kind==="idea"
        ? ("\uD83D\uDCA1 Wants ideas: "+q.ref_name)
        : (dayFull(q.ref_day)+" \u00b7 "+q.ref_name+" \u2014 change requested");
      left.appendChild(el("div","req-meal",label));
      var da=daysAgo(new Date(q.created_at).getTime());
      left.appendChild(el("div","req-when","Requested "+(da===0?"today":(da===1?"yesterday":da+" days ago"))));
      item.appendChild(left);
      var acts=el("div","req-acts");
      if(q.kind==="recipe"){
        var pbtn=el("button","req-place","Place it \u203a");
        pbtn.onclick=(function(qq,s){return function(){openFit(qq,s);};})(q,slug);
        acts.appendChild(pbtn);
      }
      var rbtn=el("button","req-resolve","Mark done");
      rbtn.onclick=(function(id,s){return function(){resolveReq(id,s);};})(q.id,slug);
      acts.appendChild(rbtn);
      item.appendChild(acts);
      rbox.appendChild(item);
    });
    dc.appendChild(rbox);
  }

  // Renewal
  var renewDays=daysUntil(c.end_date);
  if(c.end_date||c.package){
    var rw=el("div","renew"+(renewDays!=null&&renewDays<=14?" soon":""));
    var rl2=el("div","");
    rl2.appendChild(el("div","renew-l",c.package||"Package"));
    rl2.appendChild(el("div","renew-v", c.end_date?("Ends "+new Date(c.end_date+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})):"No end date"));
    rw.appendChild(rl2);
    if(renewDays!=null){
      var rr=el("div","");rr.style.textAlign="right";
      rr.appendChild(el("div","renew-l", renewDays<0?"Overdue":"Remaining"));
      rr.appendChild(el("div","renew-v", renewDays<0?(Math.abs(renewDays)+"d ago"):(renewDays+" days")));
      rw.appendChild(rr);
    }
    dc.appendChild(rw);
  }

  // Two-column detail on desktop
  var dg=el("div","detail-grid");
  var L=el("div","dcol"), R=el("div","dcol");
  dg.appendChild(L);dg.appendChild(R);
  dc.appendChild(dg);

  // Coach notes — private log + check-in record
  R.appendChild(el("div","sec-label","Coach notes"));
  var na=el("div","note-add");
  var nin=el("textarea","note-in");nin.id="cn-txt";nin.placeholder="What did you discuss? Agreed actions, excuses, wins…";
  na.appendChild(nin);
  var nrow=el("div","note-row");
  var ndt=el("input","note-date");ndt.id="cn-date";ndt.type="date";ndt.value=ymd(new Date());
  var nsv=el("button","note-save","Add note");
  nsv.onclick=(function(s){return function(){addCoachNote(s);};})(slug);
  nrow.appendChild(ndt);nrow.appendChild(nsv);
  na.appendChild(nrow);
  R.appendChild(na);

  var nlist=el("div","");nlist.id="cn-list";
  R.appendChild(nlist);
  drawCoachNotes(cnotes,slug);

  if(flags.length){
    L.appendChild(el("div","sec-label","Ready to increase weight"));
    flags.forEach(function(f){var row=el("div","po-item");row.appendChild(el("span","po-name",f));row.appendChild(el("span","po-tag","↑ Increase"));L.appendChild(row);});
  }

  // Weight
  L.appendChild(el("div","sec-label","Weight"));
  var wbox=el("div","wt-box");
  if(wt){
    var wh=el("div","wt-head");
    var cur=el("div","wt-cur");cur.innerHTML=wt.last.toFixed(1)+"<small>kg</small>";wh.appendChild(cur);
    var dl=el("div","wt-delta");dl.textContent=(wt.delta<0?"▼":(wt.delta>0?"▲":"—"))+" "+Math.abs(wt.delta).toFixed(1)+" kg";wh.appendChild(dl);
    wh.appendChild(el("div","wt-start","from "+wt.first.toFixed(1)+"kg"));
    wbox.appendChild(wh);
    wbox.insertAdjacentHTML("beforeend",weightChartSVG(wt.pts));
  }else{
    wbox.appendChild(el("div","wt-empty","No weigh-ins logged yet."));
  }
  L.appendChild(wbox);

  // Food logging adherence
  R.appendChild(el("div","sec-label","Food logging — last 30 days"));
  var aw=el("div","adh-wrap");
  var at=el("div","adh-top");
  var ap=el("div","adh-pct");ap.innerHTML=adh.pct+'<small style="font-size:16px;color:var(--ink-3);font-weight:600">%</small>';
  at.appendChild(ap);
  at.appendChild(el("div","adh-sub","logged on "+adh.count+" of 30 days"));
  aw.appendChild(at);
  var strip=el("div","adh-strip");
  adhStrip(map).forEach(function(on){strip.appendChild(el("div","adh-dot"+(on?" on":"")));});
  aw.appendChild(strip);
  R.appendChild(aw);

  // Recent food calories + snack notes
  R.appendChild(el("div","sec-label","Recent food & notes"));
  var rdays=recentDays(nat,food,notes);
  if(rdays.length){
    var ft=el("div","food-tbl");
    rdays.forEach(function(day){
      var fd=el("div","food-day");
      var fh=el("div","food-day-head");
      fh.appendChild(el("span","food-date",new Date(day.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})));
      var calTxt=day.cal>0?(Math.round(day.cal)+(targetCal?(" / "+targetCal):"")+" kcal"):"no meals logged";
      fh.appendChild(el("span","food-cal"+(targetCal&&day.cal>targetCal?" over":""),calTxt));
      fd.appendChild(fh);
      if(day.notes.length){
        var nl=el("div","food-notes");
        day.notes.forEach(function(n){nl.appendChild(el("div","food-note","• "+n));});
        fd.appendChild(nl);
      }
      ft.appendChild(fd);
    });
    R.appendChild(ft);
  }else{
    R.appendChild(el("div","wt-empty","No food or notes logged yet."));
  }

  // Progress photos
  if(photos.length){
    R.appendChild(el("div","sec-label","Progress photos"));
    var pg=el("div","pgrid");
    var su=await sb.storage.from("progress-photos").createSignedUrls(photos.map(function(p){return p.storage_path;}),3600);
    var umap={};if(su.data)su.data.forEach(function(s){umap[s.path]=s.signedUrl;});
    photos.forEach(function(p){
      var tile=el("div","ptile");var url=umap[p.storage_path];
      if(url)tile.style.backgroundImage="url('"+url+"')";
      tile.appendChild(el("div","pdate",new Date(p.taken_date+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"})));
      tile.onclick=(function(u){return function(){openLB(u);};})(url);
      pg.appendChild(tile);
    });
    R.appendChild(pg);
  }

  // Gym progress — every exercise, last weight × reps, change since last time
  L.appendChild(el("div","sec-label","Gym progress"));
  var lrows=liftTable(lift);
  if(lrows.length){
    var tbl=el("div","lift-tbl");
    var th=el("div","lift-row lift-head");
    th.appendChild(el("div","lt-ex","Exercise"));
    th.appendChild(el("div","lt-last","Last"));
    th.appendChild(el("div","lt-chg","Change"));
    tbl.appendChild(th);
    lrows.forEach(function(r){
      var tr=el("div","lift-row");
      tr.appendChild(el("div","lt-ex",r.name));
      tr.appendChild(el("div","lt-last", r.weight>0?(fmtW(r.weight)+"kg × "+r.reps):(r.reps+" reps")));
      var chg=el("div","lt-chg");
      if(r.change===null)chg.innerHTML='<span class="chg-none">first</span>';
      else if(r.change>0)chg.innerHTML='<span class="chg-up">▲ +'+fmtW(r.change)+'kg</span>';
      else if(r.change<0)chg.innerHTML='<span class="chg-dn">▼ −'+fmtW(Math.abs(r.change))+'kg</span>';
      else chg.innerHTML='<span class="chg-none">—</span>';
      tr.appendChild(chg);
      tbl.appendChild(tr);
    });
    L.appendChild(tbl);
  }else{
    L.appendChild(el("div","wt-empty","No gym sessions logged yet."));
  }
}

function fmtW(w){ return (Math.round((w||0)*10)/10).toString(); }

function liftTable(lift){
  var byEx={};
  lift.forEach(function(r){
    if(!byEx[r.ex_id])byEx[r.ex_id]={name:r.ex_name,dates:{}};
    var d=r.logged_at?new Date(r.logged_at).toDateString():"?";
    if(!byEx[r.ex_id].dates[d])byEx[r.ex_id].dates[d]=[];
    byEx[r.ex_id].dates[d].push(r);
  });
  var out=[];
  Object.keys(byEx).forEach(function(id){
    var ex=byEx[id];
    var dks=Object.keys(ex.dates).sort(function(a,b){return new Date(a)-new Date(b);});
    if(!dks.length)return;
    function top(rows){var t=rows[0];rows.forEach(function(r){if((r.weight||0)>(t.weight||0))t=r;});return t;}
    var lastT=top(ex.dates[dks[dks.length-1]]);
    var prevT=dks.length>1?top(ex.dates[dks[dks.length-2]]):null;
    out.push({name:ex.name,weight:lastT.weight||0,reps:lastT.reps||0,change:prevT?((lastT.weight||0)-(prevT.weight||0)):null,lastMs:new Date(dks[dks.length-1]).getTime()});
  });
  out.sort(function(a,b){return b.lastMs-a.lastMs;});
  return out;
}

function recentDays(nat,food,notes){
  var by={};
  function bump(d,c){if(!d)return;if(!by[d])by[d]={cal:0,notes:[]};by[d].cal+=c||0;}
  (nat||[]).forEach(function(r){bump(r.logged_date,r.calories);});
  (food||[]).forEach(function(r){bump(r.logged_date,r.calories);});
  (notes||[]).forEach(function(r){if(!r.logged_date)return;if(!by[r.logged_date])by[r.logged_date]={cal:0,notes:[]};by[r.logged_date].notes.push(r.note);});
  return Object.keys(by).sort().reverse().slice(0,7).map(function(d){return {date:d,cal:by[d].cal,notes:by[d].notes};});
}

loadDash();
