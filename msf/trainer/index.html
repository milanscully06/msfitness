<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Trainer · MS Fitness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0E0C0B;
  --surface:#181513;
  --surface-2:#211C19;
  --line:rgba(244,238,228,0.09);
  --line-2:rgba(244,238,228,0.16);
  --ink:#F4EEE4;
  --ink-2:rgba(244,238,228,0.56);
  --ink-3:rgba(244,238,228,0.34);
  --sage:#9DB49A;
  --bad:#C97A6D;
  --radius:18px;
  --display:'Bricolage Grotesque',sans-serif;
  --body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:var(--bg)}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:0 0 60px}

.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;background:rgba(14,12,11,.86);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.tb-title{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-.02em;line-height:1}
.tb-sub{font-size:11px;color:var(--ink-3);margin-top:3px;letter-spacing:.1em;text-transform:uppercase}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--sage);transition:background .2s}
.sync-dot.syncing{background:var(--fat);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

.cpills{display:flex;gap:7px;overflow-x:auto;padding:14px 20px 6px;scrollbar-width:none}
.cpills::-webkit-scrollbar{display:none}
.client-pill{padding:8px 15px;border:1px solid var(--line-2);border-radius:99px;font-size:13px;font-weight:600;background:var(--surface);color:var(--ink-2);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.client-pill.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

#dcontent{padding:0 20px;margin-top:6px}
.sec-label{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-3);margin:26px 0 12px}
.loader,.empty{text-align:center;padding:3rem 1rem;color:var(--ink-3);font-size:14px;line-height:1.6}

.av{width:42px;height:42px;border-radius:50%;background:var(--surface-2);border:1px solid var(--line-2);display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:14px;color:var(--ink-2);flex-shrink:0}

.tcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px 18px;margin-bottom:13px;cursor:pointer;transition:border-color .15s,transform .12s}
.tcard:active{transform:scale(.995)}
.tc-head{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.tc-name{font-family:var(--display);font-weight:700;font-size:17px;letter-spacing:-.01em;line-height:1.1}
.tc-goal{font-size:12px;color:var(--ink-3);margin-top:2px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0 0}
.stat-box{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
.tcard .stat-box{background:var(--surface-2)}
.stat-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3);margin-bottom:7px}
.stat-val{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.01em;line-height:1}
.stat-val small{font-size:12px;color:var(--ink-3);font-weight:600;margin-left:1px}

.flag-row{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:11px;font-size:12.5px;font-weight:600;margin-top:9px;line-height:1.35}
.flag-up{background:rgba(157,180,154,.13);color:var(--sage)}
.flag-warn{background:rgba(201,122,109,.13);color:var(--bad)}
.tlink{font-size:11.5px;color:var(--ink-3);font-family:var(--body);margin-top:13px;letter-spacing:.02em}

.po-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--surface);border:1px solid var(--line);border-radius:12px;margin-bottom:8px}
.po-name{font-size:13.5px;font-weight:600}
.po-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;background:rgba(157,180,154,.14);color:var(--sage);white-space:nowrap}

.wt-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.wt-head{display:flex;align-items:baseline;gap:14px;margin-bottom:14px;flex-wrap:wrap}
.wt-cur{font-family:var(--display);font-weight:800;font-size:32px;letter-spacing:-.02em;line-height:1}
.wt-cur small{font-size:14px;color:var(--ink-3);font-weight:600;margin-left:2px}
.wt-delta{font-family:var(--display);font-weight:700;font-size:15px;color:var(--sage)}
.wt-start{font-size:12px;color:var(--ink-3);margin-left:auto}
.wt-chart{width:100%;height:auto;display:block}
.wt-empty{font-size:13px;color:var(--ink-3);text-align:center;padding:14px 10px}

.adh-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
.adh-top{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:15px}
.adh-pct{font-family:var(--display);font-weight:800;font-size:34px;letter-spacing:-.02em;line-height:1}
.adh-sub{font-size:12px;color:var(--ink-2);text-align:right}
.adh-strip{display:grid;grid-template-columns:repeat(15,1fr);gap:4px}
.adh-dot{aspect-ratio:1;border-radius:3px;background:var(--surface-2)}
.adh-dot.on{background:var(--sage)}

.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.ptile{aspect-ratio:3/4;border-radius:14px;background:var(--surface-2) center/cover no-repeat;border:1px solid var(--line);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:8px;cursor:pointer}
.ptile::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5),transparent 55%)}
.pdate{font-size:10px;color:#fff;font-weight:600;position:relative;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.6)}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9999;align-items:center;justify-content:center;padding:24px}
.lb.show{display:flex}
.lb img{max-width:100%;max-height:82vh;border-radius:12px;object-fit:contain}
.lb-x{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;border:1px solid var(--line-2);background:rgba(0,0,0,.45);color:var(--ink);font-size:17px;cursor:pointer}

.chart-sel{width:100%;background:var(--surface-2);border:1px solid var(--line-2);border-radius:12px;padding:12px 14px;color:var(--ink);font-family:var(--body);font-size:14px;margin-bottom:12px;-webkit-appearance:none}
.chart-sel:focus{outline:none;border-color:var(--sage)}
.chart-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
.lift-tbl{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.lift-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
.lift-row:last-child{border-bottom:none}
.lift-head{background:var(--surface-2)}
.lift-head>div{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-3)}
.lt-ex{font-size:13px;font-weight:600;color:var(--ink);min-width:0;overflow:hidden;text-overflow:ellipsis}
.lt-last{font-size:13px;font-weight:600;color:var(--ink-2);white-space:nowrap;text-align:right}
.lt-chg{font-size:12px;font-weight:700;white-space:nowrap;text-align:right;min-width:78px}
.chg-up{color:var(--sage)}
.chg-dn{color:var(--bad)}
.chg-none{color:var(--ink-3)}
.food-tbl{display:flex;flex-direction:column;gap:8px}
.food-day{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
.food-day-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.food-date{font-size:13px;font-weight:600;color:var(--ink)}
.food-cal{font-size:13px;font-weight:700;color:var(--sage);white-space:nowrap}
.food-cal.over{color:var(--bad)}
.food-notes{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:3px}
.food-note{font-size:12px;color:var(--ink-2);line-height:1.5}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><div class="tb-title">Trainer</div><div class="tb-sub">MS Fitness · live data</div></div>
    <div class="sync-dot" id="sd"></div>
  </div>
  <div class="cpills" id="cpills"></div>
  <div id="dcontent"><div class="loader">Loading clients…</div></div>
</div>
<div class="lb" id="lightbox"><button class="lb-x" onclick="closeLB()">✕</button><img id="lb-img" alt=""></div>

<script>
var SB_URL="https://idlwqbgsnjoikoyhifbr.supabase.co";
var SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkbHdxYmdzbmpvaWtveWhpZmJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NjI5MDksImV4cCI6MjA5NzAzODkwOX0.K6axtuPPxVHn5CtZ5kplw20P5YtLd7kpAAkylhk-QNg";
var sb=supabase.createClient(SB_URL,SB_KEY);
var clients=[],curClient=null,chart=null;

function el(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;if(txt!==undefined)e.textContent=txt;return e;}
function sync(on){document.getElementById("sd").classList.toggle("syncing",!!on);}
function initials(name){return (name||"").split(" ").map(function(w){return w[0]||"";}).join("").slice(0,2).toUpperCase();}
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function signed(n){return (n>0?"+":"")+n.toFixed(1);}

// ── METRICS ──
function sessionCount(liftRows){
  return new Set(liftRows.map(function(r){return new Date(r.logged_at).toDateString()+"_"+r.day;})).size;
}
function lastActiveMs(lift,body,nat,food){
  var t=[];
  lift.forEach(function(r){if(r.logged_at)t.push(new Date(r.logged_at).getTime());});
  body.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  nat.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  food.forEach(function(r){if(r.logged_date)t.push(new Date(r.logged_date+"T12:00:00").getTime());});
  return t.length?Math.max.apply(null,t):null;
}
function weightTrend(body){
  var pts=body.filter(function(r){return r.weight!=null;}).slice().sort(function(a,b){return a.logged_date<b.logged_date?-1:1;});
  if(!pts.length)return null;
  var first=parseFloat(pts[0].weight),last=parseFloat(pts[pts.length-1].weight);
  return {first:first,last:last,delta:last-first,pts:pts};
}
function loggedMapOf(nat,food){var m={};nat.forEach(function(r){m[r.logged_date]=1;});food.forEach(function(r){m[r.logged_date]=1;});return m;}
function adh30(map){
  var today=new Date();today.setHours(12,0,0,0);var count=0;
  for(var i=0;i<30;i++){var d=new Date(today);d.setDate(d.getDate()-i);if(map[ymd(d)])count++;}
  return {count:count,pct:Math.round(count/30*100)};
}
function adhStrip(map){
  var today=new Date();today.setHours(12,0,0,0);var out=[];
  for(var i=29;i>=0;i--){var d=new Date(today);d.setDate(d.getDate()-i);out.push(!!map[ymd(d)]);}
  return out;
}
function getFlags(rows){
  var flags=[],today=new Date().toDateString();
  var tr=rows.filter(function(r){return new Date(r.logged_at).toDateString()===today;});
  var byEx={};
  tr.forEach(function(r){if(!byEx[r.ex_id])byEx[r.ex_id]={name:r.ex_name,sets:[]};byEx[r.ex_id].sets[r.set_index]=r;});
  Object.values(byEx).forEach(function(ex){
    var f=ex.sets.filter(Boolean);if(!f.length)return;
    var ok=f.every(function(s,i){return i===0||(s.reps&&s.reps>=8);});
    if(ok&&!flags.includes(ex.name))flags.push(ex.name);
  });
  return flags;
}

function weightChartSVG(pts){
  if(!pts.length)return '<div class="wt-empty">No weigh-ins yet.</div>';
  var ws=pts.map(function(p){return parseFloat(p.weight);});
  var min=Math.min.apply(null,ws),max=Math.max.apply(null,ws);
  if(min===max){min-=1;max+=1;}
  var pad=(max-min)*0.18;min-=pad;max+=pad;
  var W=320,H=130,n=pts.length;
  function X(i){return n===1?W/2:+((i/(n-1))*W).toFixed(1);}
  function Y(w){return +(H-((w-min)/(max-min))*H).toFixed(1);}
  var line="";
  pts.forEach(function(p,i){line+=(i===0?"M":"L")+X(i)+","+Y(parseFloat(p.weight));});
  var area=line+"L"+X(n-1)+","+H+"L"+X(0)+","+H+"Z";
  var lx=X(n-1),ly=Y(parseFloat(pts[n-1].weight));
  var svg='<svg class="wt-chart" viewBox="0 0 '+W+' '+H+'">';
  svg+='<defs><linearGradient id="wtg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(157,180,154,.28)"/><stop offset="100%" stop-color="rgba(157,180,154,0)"/></linearGradient></defs>';
  if(n>1){svg+='<path d="'+area+'" fill="url(#wtg)"/><path d="'+line+'" fill="none" stroke="#9DB49A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>';}
  svg+='<circle cx="'+lx+'" cy="'+ly+'" r="4" fill="#9DB49A"/></svg>';
  return svg;
}

function statBox(lbl,valHTML){var b=el("div","stat-box");b.appendChild(el("div","stat-lbl",lbl));var v=el("div","stat-val");v.innerHTML=valHTML;b.appendChild(v);return b;}

// ── PHOTO LIGHTBOX (view only) ──
function openLB(url){if(!url)return;document.getElementById("lb-img").src=url;document.getElementById("lightbox").classList.add("show");}
function closeLB(){document.getElementById("lightbox").classList.remove("show");document.getElementById("lb-img").src="";}

// ── BOOT ──
async function loadDash(){
  var res=await sb.from("clients").select("*").order("created_at");
  clients=res.data||[];
  var pills=document.getElementById("cpills");pills.innerHTML="";
  if(!clients.length){document.getElementById("dcontent").innerHTML='<div class="empty">No clients yet.<br>Add them in the admin panel.</div>';return;}
  var ov=el("div","client-pill active","Overview");ov.onclick=function(){selAll(this);};pills.appendChild(ov);
  clients.forEach(function(c){
    var p=el("div","client-pill",c.name.split(" ")[0]);p.dataset.slug=c.slug;
    p.onclick=function(){selOne(this.dataset.slug,this);};pills.appendChild(p);
  });
  renderOverview();
}
function selAll(elp){
  document.querySelectorAll(".client-pill").forEach(function(p){p.classList.remove("active");});
  if(elp)elp.classList.add("active");
  curClient=null;renderOverview();
}
function selOne(slug,elp){
  document.querySelectorAll(".client-pill").forEach(function(p){p.classList.remove("active");});
  if(elp)elp.classList.add("active");
  curClient=slug;window.scrollTo(0,0);renderClient(slug);
}

// ── OVERVIEW (all clients) ──
async function renderOverview(){
  var dc=document.getElementById("dcontent");
  dc.innerHTML="";dc.appendChild(el("div","loader","Loading…"));
  sync(true);
  var rl=await sb.from("lift_logs").select("*");
  var rb=await sb.from("body_logs").select("client_slug,logged_date,weight");
  var rn=await sb.from("nutrition_logs").select("client_slug,logged_date");
  var rf=await sb.from("food_logs").select("client_slug,logged_date");
  sync(false);
  function byKey(arr,k){var m={};(arr||[]).forEach(function(r){var v=r[k];if(!m[v])m[v]=[];m[v].push(r);});return m;}
  var liftBy=byKey(rl.data,"client"),bodyBy=byKey(rb.data,"client_slug"),natBy=byKey(rn.data,"client_slug"),foodBy=byKey(rf.data,"client_slug");

  dc.innerHTML="";
  clients.forEach(function(c){
    var lr=liftBy[c.slug]||[],br=bodyBy[c.slug]||[],nr=natBy[c.slug]||[],fr=foodBy[c.slug]||[];
    var sessions=sessionCount(lr);
    var la=lastActiveMs(lr,br,nr,fr);
    var inactive=la!=null?Math.floor((Date.now()-la)/86400000):null;
    var wt=weightTrend(br);
    var adh=adh30(loggedMapOf(nr,fr));
    var flags=getFlags(lr.slice().reverse());

    var card=el("div","tcard");
    card.onclick=(function(s){return function(){var pill=document.querySelector('.client-pill[data-slug="'+s+'"]');selOne(s,pill);};})(c.slug);
    var head=el("div","tc-head");head.appendChild(el("div","av",initials(c.name)));
    var hi=el("div");hi.appendChild(el("div","tc-name",c.name));hi.appendChild(el("div","tc-goal",c.goal||""));head.appendChild(hi);
    card.appendChild(head);

    var grid=el("div","stat-grid");
    grid.appendChild(statBox("Sessions",String(sessions)));
    grid.appendChild(statBox("Last active",inactive==null?"—":(inactive===0?"Today":inactive+"d")));
    grid.appendChild(statBox("Food logged",adh.pct+"<small>%</small>"));
    grid.appendChild(statBox("Weight",wt?signed(wt.delta)+"<small>kg</small>":"—"));
    card.appendChild(grid);

    if(flags.length){
      var fu=el("div","flag-row flag-up");fu.textContent="↑ Ready to increase: "+flags.slice(0,3).join(", ")+(flags.length>3?"…":"");
      card.appendChild(fu);
    }
    if(inactive!=null&&inactive>=4){
      var fw=el("div","flag-row flag-warn");fw.textContent="⚠ "+inactive+" days since last activity";
      card.appendChild(fw);
    }
    card.appendChild(el("div","tlink","/client/"+c.slug));
    dc.appendChild(card);
  });
}

// ── PER-CLIENT DEEP VIEW ──
async function renderClient(slug){
  var dc=document.getElementById("dcontent");dc.innerHTML="";dc.appendChild(el("div","loader","Loading…"));
  sync(true);
  var c=clients.find(function(x){return x.slug===slug;})||{name:slug,slug:slug};
  var r1=await sb.from("lift_logs").select("*").eq("client",slug).order("logged_at",{ascending:true});
  var r2=await sb.from("programs").select("ex_id,ex_name").eq("client_slug",slug);
  var rb=await sb.from("body_logs").select("client_slug,logged_date,weight").eq("client_slug",slug);
  var rn=await sb.from("nutrition_logs").select("client_slug,logged_date,calories").eq("client_slug",slug);
  var rf=await sb.from("food_logs").select("client_slug,logged_date,calories").eq("client_slug",slug);
  var rp=await sb.from("progress_photos").select("*").eq("client_slug",slug).order("taken_date",{ascending:false});
  var rx=await sb.from("extra_logs").select("logged_date,note,created_at").eq("client_slug",slug);
  var rt=await sb.from("nutrition_targets").select("calories").eq("client_slug",slug).maybeSingle();
  sync(false);
  var lift=r1.data||[],body=rb.data||[],nat=rn.data||[],food=rf.data||[],photos=rp.data||[];
  var notes=rx.data||[],targetCal=(rt.data&&rt.data.calories)||0;

  var sessions=sessionCount(lift);
  var wt=weightTrend(body);
  var map=loggedMapOf(nat,food);
  var adh=adh30(map);
  var flags=getFlags(lift.slice().reverse());
  var weeksIn=c.created_at?Math.floor((Date.now()-new Date(c.created_at).getTime())/(7*86400000)):0;
  var allEx=[];(r2.data||[]).forEach(function(r){if(!allEx.find(function(x){return x.id===r.ex_id;}))allEx.push({id:r.ex_id,name:r.ex_name});});

  dc.innerHTML="";
  var head=el("div","tc-head");head.style.marginTop="6px";head.appendChild(el("div","av",initials(c.name)));
  var hi=el("div");hi.appendChild(el("div","tc-name",c.name));hi.appendChild(el("div","tc-goal",c.goal||(sessions+" sessions logged")));head.appendChild(hi);
  dc.appendChild(head);

  var grid=el("div","stat-grid");
  grid.appendChild(statBox("Weeks in",String(weeksIn)));
  grid.appendChild(statBox("Sessions",String(sessions)));
  grid.appendChild(statBox("Weight",wt?signed(wt.delta)+"<small>kg</small>":"—"));
  grid.appendChild(statBox("Food logged",adh.pct+"<small>%</small>"));
  dc.appendChild(grid);

  if(flags.length){
    dc.appendChild(el("div","sec-label","Ready to increase weight"));
    flags.forEach(function(f){var row=el("div","po-item");row.appendChild(el("span","po-name",f));row.appendChild(el("span","po-tag","↑ Increase"));dc.appendChild(row);});
  }

  // Weight
  dc.appendChild(el("div","sec-label","Weight"));
  var wbox=el("div","wt-box");
  if(wt){
    var wh=el("div","wt-head");
    var cur=el("div","wt-cur");cur.innerHTML=wt.last.toFixed(1)+"<small>kg</small>";wh.appendChild(cur);
    var dl=el("div","wt-delta");dl.textContent=(wt.delta<0?"▼":(wt.delta>0?"▲":"—"))+" "+Math.abs(wt.delta).toFixed(1)+" kg";wh.appendChild(dl);
    wh.appendChild(el("div","wt-start","from "+wt.first.toFixed(1)+"kg"));
    wbox.appendChild(wh);
    wbox.insertAdjacentHTML("beforeend",weightChartSVG(wt.pts));
  }else{
    wbox.appendChild(el("div","wt-empty","No weigh-ins logged yet."));
  }
  dc.appendChild(wbox);

  // Food logging adherence
  dc.appendChild(el("div","sec-label","Food logging — last 30 days"));
  var aw=el("div","adh-wrap");
  var at=el("div","adh-top");
  var ap=el("div","adh-pct");ap.innerHTML=adh.pct+'<small style="font-size:16px;color:var(--ink-3);font-weight:600">%</small>';
  at.appendChild(ap);
  at.appendChild(el("div","adh-sub","logged on "+adh.count+" of 30 days"));
  aw.appendChild(at);
  var strip=el("div","adh-strip");
  adhStrip(map).forEach(function(on){strip.appendChild(el("div","adh-dot"+(on?" on":"")));});
  aw.appendChild(strip);
  dc.appendChild(aw);

  // Recent food calories + snack notes
  dc.appendChild(el("div","sec-label","Recent food & notes"));
  var rdays=recentDays(nat,food,notes);
  if(rdays.length){
    var ft=el("div","food-tbl");
    rdays.forEach(function(day){
      var fd=el("div","food-day");
      var fh=el("div","food-day-head");
      fh.appendChild(el("span","food-date",new Date(day.date+"T12:00:00").toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"})));
      var calTxt=day.cal>0?(Math.round(day.cal)+(targetCal?(" / "+targetCal):"")+" kcal"):"no meals logged";
      fh.appendChild(el("span","food-cal"+(targetCal&&day.cal>targetCal?" over":""),calTxt));
      fd.appendChild(fh);
      if(day.notes.length){
        var nl=el("div","food-notes");
        day.notes.forEach(function(n){nl.appendChild(el("div","food-note","• "+n));});
        fd.appendChild(nl);
      }
      ft.appendChild(fd);
    });
    dc.appendChild(ft);
  }else{
    dc.appendChild(el("div","wt-empty","No food or notes logged yet."));
  }

  // Progress photos
  if(photos.length){
    dc.appendChild(el("div","sec-label","Progress photos"));
    var pg=el("div","pgrid");
    var su=await sb.storage.from("progress-photos").createSignedUrls(photos.map(function(p){return p.storage_path;}),3600);
    var umap={};if(su.data)su.data.forEach(function(s){umap[s.path]=s.signedUrl;});
    photos.forEach(function(p){
      var tile=el("div","ptile");var url=umap[p.storage_path];
      if(url)tile.style.backgroundImage="url('"+url+"')";
      tile.appendChild(el("div","pdate",new Date(p.taken_date+"T12:00:00").toLocaleDateString("en-AU",{day:"numeric",month:"short"})));
      tile.onclick=(function(u){return function(){openLB(u);};})(url);
      pg.appendChild(tile);
    });
    dc.appendChild(pg);
  }

  // Gym progress — every exercise, last weight × reps, change since last time
  dc.appendChild(el("div","sec-label","Gym progress"));
  var lrows=liftTable(lift);
  if(lrows.length){
    var tbl=el("div","lift-tbl");
    var th=el("div","lift-row lift-head");
    th.appendChild(el("div","lt-ex","Exercise"));
    th.appendChild(el("div","lt-last","Last"));
    th.appendChild(el("div","lt-chg","Change"));
    tbl.appendChild(th);
    lrows.forEach(function(r){
      var tr=el("div","lift-row");
      tr.appendChild(el("div","lt-ex",r.name));
      tr.appendChild(el("div","lt-last", r.weight>0?(fmtW(r.weight)+"kg × "+r.reps):(r.reps+" reps")));
      var chg=el("div","lt-chg");
      if(r.change===null)chg.innerHTML='<span class="chg-none">first</span>';
      else if(r.change>0)chg.innerHTML='<span class="chg-up">▲ +'+fmtW(r.change)+'kg</span>';
      else if(r.change<0)chg.innerHTML='<span class="chg-dn">▼ −'+fmtW(Math.abs(r.change))+'kg</span>';
      else chg.innerHTML='<span class="chg-none">—</span>';
      tr.appendChild(chg);
      tbl.appendChild(tr);
    });
    dc.appendChild(tbl);
  }else{
    dc.appendChild(el("div","wt-empty","No gym sessions logged yet."));
  }
}

function fmtW(w){ return (Math.round((w||0)*10)/10).toString(); }

function liftTable(lift){
  var byEx={};
  lift.forEach(function(r){
    if(!byEx[r.ex_id])byEx[r.ex_id]={name:r.ex_name,dates:{}};
    var d=r.logged_at?new Date(r.logged_at).toDateString():"?";
    if(!byEx[r.ex_id].dates[d])byEx[r.ex_id].dates[d]=[];
    byEx[r.ex_id].dates[d].push(r);
  });
  var out=[];
  Object.keys(byEx).forEach(function(id){
    var ex=byEx[id];
    var dks=Object.keys(ex.dates).sort(function(a,b){return new Date(a)-new Date(b);});
    if(!dks.length)return;
    function top(rows){var t=rows[0];rows.forEach(function(r){if((r.weight||0)>(t.weight||0))t=r;});return t;}
    var lastT=top(ex.dates[dks[dks.length-1]]);
    var prevT=dks.length>1?top(ex.dates[dks[dks.length-2]]):null;
    out.push({name:ex.name,weight:lastT.weight||0,reps:lastT.reps||0,change:prevT?((lastT.weight||0)-(prevT.weight||0)):null,lastMs:new Date(dks[dks.length-1]).getTime()});
  });
  out.sort(function(a,b){return b.lastMs-a.lastMs;});
  return out;
}

function recentDays(nat,food,notes){
  var by={};
  function bump(d,c){if(!d)return;if(!by[d])by[d]={cal:0,notes:[]};by[d].cal+=c||0;}
  (nat||[]).forEach(function(r){bump(r.logged_date,r.calories);});
  (food||[]).forEach(function(r){bump(r.logged_date,r.calories);});
  (notes||[]).forEach(function(r){if(!r.logged_date)return;if(!by[r.logged_date])by[r.logged_date]={cal:0,notes:[]};by[r.logged_date].notes.push(r.note);});
  return Object.keys(by).sort().reverse().slice(0,7).map(function(d){return {date:d,cal:by[d].cal,notes:by[d].notes};});
}

loadDash();
</script>
